<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股票投資決策模型</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --border: #1e1e2e;
  --accent: #c8a96e;
  --accent2: #4ecdc4;
  --danger: #ff6b6b;
  --text: #e8e8f0;
  --muted: #5a5a7a;
  --card: #0f0f1a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Serif TC', serif;
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(200,169,110,0.05) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(78,205,196,0.04) 0%, transparent 50%);
}
header {
  padding: 2rem 2.5rem 1.2rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: baseline;
  gap: 1.5rem;
  flex-wrap: wrap;
}
h1 { font-weight: 300; font-size: 1.5rem; letter-spacing: 0.12em; color: var(--accent); }
.subtitle { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--muted); letter-spacing: 0.2em; }
.container {
  max-width: 1080px;
  margin: 0 auto;
  padding: 2rem 2.5rem 4rem;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5rem;
}
@media (max-width: 700px) { .container { grid-template-columns: 1fr; padding: 1rem; } }
.panel { background: var(--card); border: 1px solid var(--border); border-radius: 3px; padding: 1.6rem; }
.panel-title {
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.22em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 1.4rem;
  padding-bottom: 0.7rem;
  border-bottom: 1px solid var(--border);
}
.field { margin-bottom: 1.1rem; }
label { display: block; font-size: 0.76rem; color: var(--muted); margin-bottom: 0.35rem; }
input[type="number"], input[type="text"], select {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 2px;
  color: var(--text);
  padding: 0.5rem 0.7rem;
  font-family: 'Space Mono', monospace;
  font-size: 0.8rem;
  outline: none;
  transition: border-color 0.2s;
}
input:focus, select:focus { border-color: var(--accent); }
select option { background: var(--surface); }
.slider-row { display: flex; align-items: center; gap: 0.75rem; }
input[type="range"] {
  flex: 1;
  -webkit-appearance: none;
  height: 2px;
  background: var(--border);
  outline: none;
  cursor: pointer;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
}
.slider-val { font-family: 'Space Mono', monospace; font-size: 0.75rem; color: var(--accent); min-width: 3.5rem; text-align: right; }
#analyzeBtn {
  width: 100%;
  padding: 0.85rem;
  background: transparent;
  border: 1px solid var(--accent);
  color: var(--accent);
  font-family: 'Space Mono', monospace;
  font-size: 0.72rem;
  letter-spacing: 0.18em;
  cursor: pointer;
  transition: all 0.2s;
  border-radius: 2px;
  margin-top: 0.5rem;
}
#analyzeBtn:hover { background: var(--accent); color: var(--bg); }
.result-panel { grid-column: 1 / -1; background: var(--card); border: 1px solid var(--border); border-radius: 3px; padding: 2rem; display: none; }
.result-panel.visible { display: block; animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform:none; } }
.verdict { display: flex; align-items: center; gap: 2rem; margin-bottom: 1.8rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.verdict-score { font-family: 'Space Mono', monospace; font-size: 3.5rem; font-weight: 700; line-height: 1; flex-shrink: 0; }
.verdict-info h2 { font-size: 1.1rem; font-weight: 400; margin-bottom: 0.4rem; }
.verdict-info p { font-size: 0.8rem; color: var(--muted); line-height: 1.7; max-width: 520px; }
.score-BUY { color: var(--accent2); }
.score-HOLD { color: var(--accent); }
.score-SELL { color: var(--danger); }
.section-sub-title { font-family: 'Space Mono', monospace; font-size: 0.58rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin: 1.4rem 0 0.75rem; }
.bar-row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.55rem; }
.bar-label { font-size: 0.72rem; color: var(--muted); width: 90px; flex-shrink: 0; }
.bar-track { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 2px; }
.bar-score { font-family: 'Space Mono', monospace; font-size: 0.68rem; color: var(--accent); width: 28px; text-align: right; }
.metrics-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 0.85rem; margin-top: 0.5rem; }
.metric-card { background: var(--surface); border: 1px solid var(--border); padding: 0.9rem; border-radius: 2px; }
.metric-label { font-family: 'Space Mono', monospace; font-size: 0.55rem; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; margin-bottom: 0.35rem; }
.metric-value { font-family: 'Space Mono', monospace; font-size: 1.05rem; font-weight: 700; }
.metric-sub { font-size: 0.65rem; color: var(--muted); margin-top: 0.2rem; }
.risk-badge { display: inline-block; padding: 0.15rem 0.55rem; border-radius: 2px; font-family: 'Space Mono', monospace; font-size: 0.6rem; letter-spacing: 0.08em; margin-left: 0.5rem; }
.risk-LOW { background: rgba(78,205,196,0.15); color: var(--accent2); border: 1px solid rgba(78,205,196,0.3); }
.risk-MED { background: rgba(200,169,110,0.15); color: var(--accent); border: 1px solid rgba(200,169,110,0.3); }
.risk-HIGH { background: rgba(255,107,107,0.15); color: var(--danger); border: 1px solid rgba(255,107,107,0.3); }
.info-note { font-size: 0.68rem; color: var(--muted); margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border); line-height: 1.7; font-style: italic; }
</style>
</head>
<body>

<header>
  <h1>股票投資決策模型</h1>
  <span class="subtitle">EQUITY DECISION FRAMEWORK v1.1</span>
</header>

<div class="container">
  <div class="panel">
    <div class="panel-title">基本評估參數</div>
    <div class="field">
      <label>股票名稱 / 代號</label>
      <input type="text" id="stockName" placeholder="e.g. 台積電 2330">
    </div>
    <div class="field">
      <label>目前股價（元）</label>
      <input type="number" id="price" placeholder="0" min="0" step="0.1" value="100">
    </div>
    <div class="field">
      <label>本益比 P/E Ratio</label>
      <input type="number" id="pe" placeholder="0" min="0" step="0.1" value="20">
    </div>
    <div class="field">
      <label>股價淨值比 P/B Ratio</label>
      <input type="number" id="pb" placeholder="0" min="0" step="0.01" value="2">
    </div>
    <div class="field">
      <label>殖利率（%）</label>
      <div class="slider-row">
        <input type="range" id="yieldSlider" min="0" max="15" step="0.1" value="3">
        <span class="slider-val" id="yieldVal">3.0%</span>
      </div>
    </div>
    <div class="field">
      <label>EPS 成長率（%，YoY）</label>
      <div class="slider-row">
        <input type="range" id="epsSlider" min="-50" max="100" step="1" value="10">
        <span class="slider-val" id="epsVal">10%</span>
      </div>
    </div>
    <div class="field">
      <label>產業</label>
      <select id="sector">
        <option value="tech">科技 / 半導體</option>
        <option value="fin">金融</option>
        <option value="consumer">消費</option>
        <option value="industrial">工業 / 製造</option>
        <option value="health">醫療 / 生技</option>
        <option value="energy">能源</option>
        <option value="utility">公用事業</option>
      </select>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">進階風險 &amp; 市場參數</div>
    <div class="field">
      <label>Beta 值（市場相關性）</label>
      <div class="slider-row">
        <input type="range" id="betaSlider" min="0" max="3" step="0.05" value="1">
        <span class="slider-val" id="betaVal">1.00</span>
      </div>
    </div>
    <div class="field">
      <label>負債比率（%）</label>
      <div class="slider-row">
        <input type="range" id="debtSlider" min="0" max="100" step="1" value="30">
        <span class="slider-val" id="debtVal">30%</span>
      </div>
    </div>
    <div class="field">
      <label>ROE 股東權益報酬率（%）</label>
      <div class="slider-row">
        <input type="range" id="roeSlider" min="0" max="60" step="0.5" value="15">
        <span class="slider-val" id="roeVal">15.0%</span>
      </div>
    </div>
    <div class="field">
      <label>法人近 3 月持股變化</label>
      <select id="instFlow">
        <option value="4">大幅買超</option>
        <option value="3" selected>小幅買超</option>
        <option value="2">持平</option>
        <option value="1">小幅賣超</option>
        <option value="0">大幅賣超</option>
      </select>
    </div>
    <div class="field">
      <label>技術面趨勢（MA 排列）</label>
      <select id="technical">
        <option value="3">多頭排列（強勢）</option>
        <option value="2" selected>短線偏多</option>
        <option value="1">盤整</option>
        <option value="0">空頭排列（弱勢）</option>
      </select>
    </div>
    <div class="field">
      <label>總體市場環境</label>
      <select id="market">
        <option value="2">牛市 / 積極</option>
        <option value="1" selected>中性</option>
        <option value="0">熊市 / 保守</option>
      </select>
    </div>
    <div class="field">
      <label>個人風險偏好</label>
      <select id="riskPref">
        <option value="aggressive">積極型</option>
        <option value="moderate" selected>穩健型</option>
        <option value="conservative">保守型</option>
      </select>
    </div>
    <button id="analyzeBtn">&#9654; 執行決策分析</button>
  </div>

  <div class="result-panel" id="resultPanel">
    <div class="panel-title">分析結果</div>
    <div class="verdict">
      <div class="verdict-score" id="verdictScore">—</div>
      <div class="verdict-info">
        <h2 id="verdictTitle">—</h2>
        <p id="verdictDesc">—</p>
      </div>
    </div>
    <div class="section-sub-title">評分維度拆解</div>
    <div id="barSection"></div>
    <div class="section-sub-title">關鍵指標摘要</div>
    <div class="metrics-grid" id="metricsGrid"></div>
    <p class="info-note">&#9888; 本模型為輔助決策工具，結果僅供參考，不構成任何投資建議。投資涉及風險，請自行評估並諮詢專業人士。</p>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {

  // Slider bindings
  var sliderConfig = [
    { sliderId: 'yieldSlider', valId: 'yieldVal',  fmt: function(v){ return parseFloat(v).toFixed(1) + '%'; } },
    { sliderId: 'epsSlider',   valId: 'epsVal',    fmt: function(v){ return parseInt(v) + '%'; } },
    { sliderId: 'betaSlider',  valId: 'betaVal',   fmt: function(v){ return parseFloat(v).toFixed(2); } },
    { sliderId: 'debtSlider',  valId: 'debtVal',   fmt: function(v){ return parseInt(v) + '%'; } },
    { sliderId: 'roeSlider',   valId: 'roeVal',    fmt: function(v){ return parseFloat(v).toFixed(1) + '%'; } }
  ];

  sliderConfig.forEach(function(cfg) {
    var slider = document.getElementById(cfg.sliderId);
    var display = document.getElementById(cfg.valId);
    if (slider && display) {
      display.textContent = cfg.fmt(slider.value);
      slider.addEventListener('input', function() {
        display.textContent = cfg.fmt(slider.value);
      });
    }
  });

  document.getElementById('analyzeBtn').addEventListener('click', function() {
    try {
      runAnalysis();
    } catch(e) {
      alert('分析發生錯誤：' + e.message);
    }
  });

  function getNum(id) { return parseFloat(document.getElementById(id).value) || 0; }
  function getStr(id) { return document.getElementById(id).value; }

  function runAnalysis() {
    var pe       = getNum('pe');
    var pb       = getNum('pb');
    var yld      = parseFloat(document.getElementById('yieldSlider').value);
    var epsG     = parseFloat(document.getElementById('epsSlider').value);
    var beta     = parseFloat(document.getElementById('betaSlider').value);
    var debt     = parseFloat(document.getElementById('debtSlider').value);
    var roe      = parseFloat(document.getElementById('roeSlider').value);
    var instFlow = parseInt(getStr('instFlow'));
    var tech     = parseInt(getStr('technical'));
    var market   = parseInt(getStr('market'));
    var riskPref = getStr('riskPref');
    var sector   = getStr('sector');
    var name     = document.getElementById('stockName').value.trim() || '目標股票';

    var sectorPE = {tech:25, fin:12, consumer:18, industrial:16, health:22, energy:14, utility:15};
    var avgPE = sectorPE[sector] || 20;

    // Valuation
    var valScore = 50;
    if (pe > 0) {
      valScore = Math.max(0, Math.min(100, 100 - (pe/avgPE - 0.8) * 80));
    }
    if (pb > 0) {
      var pbS = pb < 1 ? 90 : pb < 2 ? 75 : pb < 4 ? 55 : pb < 7 ? 35 : 15;
      valScore = (valScore + pbS) / 2;
    }

    // Growth
    var growthScore = epsG > 30 ? 90 : epsG > 15 ? 75 : epsG > 5 ? 60 : epsG > 0 ? 48 : epsG > -15 ? 30 : 10;

    // Dividend
    var divScore = yld > 6 ? 85 : yld > 4 ? 75 : yld > 2.5 ? 65 : yld > 1 ? 50 : 35;

    // Financial
    var roeS  = roe > 20 ? 85 : roe > 12 ? 65 : roe > 6 ? 45 : 25;
    var debtS = debt < 20 ? 85 : debt < 40 ? 65 : debt < 60 ? 45 : debt < 80 ? 25 : 10;
    var finScore = (roeS + debtS) / 2;

    // Sentiment
    var instArr   = [20, 40, 55, 70, 85];
    var techArr   = [20, 45, 65, 90];
    var mktArr    = [30, 55, 80];
    var instS  = (instFlow >= 0 && instFlow <= 4) ? instArr[instFlow] : 50;
    var techS  = (tech >= 0 && tech <= 3) ? techArr[tech] : 50;
    var mktS   = (market >= 0 && market <= 2) ? mktArr[market] : 55;
    var sentimentScore = instS * 0.4 + techS * 0.35 + mktS * 0.25;

    // Beta risk
    var betaScore = beta < 0.7 ? 80 : beta < 1 ? 65 : beta < 1.3 ? 50 : beta < 1.8 ? 35 : 20;

    // Weighted total
    var total = valScore*0.25 + growthScore*0.22 + divScore*0.12 + finScore*0.18 + sentimentScore*0.15 + betaScore*0.08;
    if (riskPref === 'conservative') total = total*0.92 + betaScore*0.06 - beta*5;
    if (riskPref === 'aggressive')   total = total*0.95 + growthScore*0.05 + 3;
    total = Math.max(0, Math.min(100, total));

    var scoreClass, verdictTitle, desc;
    if (total >= 70) {
      scoreClass = 'score-BUY'; verdictTitle = '建議買進';
      desc = name + ' 綜合評分達 ' + total.toFixed(0) + ' 分，估值、成長與市場面表現優異。基本面支持正向操作，建議可適量佈局，注意倉位控管。';
    } else if (total >= 48) {
      scoreClass = 'score-HOLD'; verdictTitle = '觀望 / 持有';
      desc = name + ' 評分為 ' + total.toFixed(0) + ' 分，各項指標表現參差，尚無明確訊號。建議持有現有部位，等待基本面或技術面更清晰後再行動。';
    } else {
      scoreClass = 'score-SELL'; verdictTitle = '建議減碼 / 迴避';
      desc = name + ' 評分僅 ' + total.toFixed(0) + ' 分，多項指標出現警示。建議審慎評估持有必要性，考慮逐步減碼或設定停損。';
    }

    var riskLevel = 'MED', riskText = '中等';
    if (beta < 0.8 && debt < 35 && riskPref === 'conservative') { riskLevel = 'LOW'; riskText = '低'; }
    else if (beta > 1.4 || debt > 60 || riskPref === 'aggressive') { riskLevel = 'HIGH'; riskText = '高'; }

    var peg = (epsG > 0 && pe > 0) ? (pe / epsG).toFixed(2) : '—';

    // Render verdict
    document.getElementById('verdictScore').textContent = total.toFixed(0);
    document.getElementById('verdictScore').className = 'verdict-score ' + scoreClass;
    document.getElementById('verdictTitle').innerHTML =
      verdictTitle + ' <span class="risk-badge risk-' + riskLevel + '">風險：' + riskText + '</span>';
    document.getElementById('verdictDesc').textContent = desc;

    // Bars
    var dims = [
      {label:'估值合理性', score:valScore},
      {label:'成長潛力',   score:growthScore},
      {label:'股利吸引力', score:divScore},
      {label:'財務健全度', score:finScore},
      {label:'市場情緒',   score:sentimentScore},
      {label:'風險係數',   score:betaScore}
    ];
    var barHTML = '';
    for (var i = 0; i < dims.length; i++) {
      var s = Math.round(dims[i].score);
      var c = s >= 65 ? '#4ecdc4' : s >= 45 ? '#c8a96e' : '#ff6b6b';
      barHTML += '<div class="bar-row">' +
        '<span class="bar-label">' + dims[i].label + '</span>' +
        '<div class="bar-track"><div class="bar-fill" style="width:' + s + '%;background:' + c + '"></div></div>' +
        '<span class="bar-score">' + s + '</span></div>';
    }
    document.getElementById('barSection').innerHTML = barHTML;

    // Metrics
    var metrics = [
      {label:'TOTAL SCORE',    value:total.toFixed(1),     sub:'綜合評分 / 100'},
      {label:'P/E RATIO',      value:pe || '—',            sub:'產業均值 ' + avgPE + 'x'},
      {label:'P/B RATIO',      value:pb || '—',            sub:'股價淨值比'},
      {label:'DIVIDEND YIELD', value:yld.toFixed(1) + '%', sub:'殖利率'},
      {label:'EPS GROWTH',     value:epsG + '%',           sub:'YoY 成長率'},
      {label:'PEG RATIO',      value:peg,                  sub:'< 1 為低估訊號'},
      {label:'ROE',            value:roe.toFixed(1) + '%', sub:'股東權益報酬率'},
      {label:'DEBT RATIO',     value:debt + '%',           sub:'負債比率'},
      {label:'BETA',           value:beta.toFixed(2),      sub:'市場波動相關性'}
    ];
    var mHTML = '';
    for (var j = 0; j < metrics.length; j++) {
      mHTML += '<div class="metric-card">' +
        '<div class="metric-label">' + metrics[j].label + '</div>' +
        '<div class="metric-value">' + metrics[j].value + '</div>' +
        '<div class="metric-sub">' + metrics[j].sub + '</div></div>';
    }
    document.getElementById('metricsGrid').innerHTML = mHTML;

    var panel = document.getElementById('resultPanel');
    panel.classList.add('visible');
    setTimeout(function() { panel.scrollIntoView({behavior:'smooth', block:'start'}); }, 100);
  }

});
</script>
</body>
</html>
